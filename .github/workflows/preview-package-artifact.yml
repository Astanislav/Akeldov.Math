name: Build preview package artifact

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_PATH: src/Akeldov.Math.Spatial2D/Akeldov.Math.Spatial2D.csproj
  TEST_PROJECT_PATH: tests/Akeldov.Math.Spatial2D.Tests/Akeldov.Math.Spatial2D.Tests.csproj
  TEST_ASSEMBLY_PATH: tests/Akeldov.Math.Spatial2D.Tests/bin/Debug/net6.0/Akeldov.Math.Spatial2D.Tests.dll
  PACKAGE_OUTPUT_PATH: artifacts/packages

jobs:
  build-preview-package:
    name: Build preview package artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            9.0.x

      - name: Show .NET info
        shell: pwsh
        run: dotnet --info

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore $env:PROJECT_PATH
          dotnet restore $env:TEST_PROJECT_PATH

      - name: Build tests
        shell: pwsh
        run: >
          dotnet build $env:TEST_PROJECT_PATH
          --framework net6.0
          --no-restore
          --disable-build-servers
          /maxcpucount:1

      - name: Run tests
        shell: pwsh
        run: >
          dotnet vstest $env:TEST_ASSEMBLY_PATH
          "--logger:console;verbosity=detailed"

      - name: Create preview package version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content $env:PROJECT_PATH
          $baseVersion = @($project.Project.PropertyGroup.Version | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })[0]

          if ([string]::IsNullOrWhiteSpace($baseVersion)) {
            throw "Could not read <Version> from $env:PROJECT_PATH."
          }

          $packageVersion = "$baseVersion-preview.${{ github.run_number }}.${{ github.run_attempt }}"

          if ($packageVersion -notmatch '^\d+\.\d+\.\d+-preview\.\d+\.\d+$') {
            throw "Generated package version '$packageVersion' is not a preview prerelease version."
          }

          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT
          "PACKAGE_VERSION=$packageVersion" >> $env:GITHUB_ENV

      - name: Pack
        shell: pwsh
        run: >
          dotnet pack $env:PROJECT_PATH
          --configuration Release
          --no-restore
          --output $env:PACKAGE_OUTPUT_PATH
          /p:PackageVersion=$env:PACKAGE_VERSION
          /p:ContinuousIntegrationBuild=true

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Akeldov.Math.Spatial2D.${{ steps.version.outputs.package_version }}
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
          retention-days: 14
