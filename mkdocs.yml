site_name: Akeldov.Math
site_description: Documentation for Akeldov.Math libraries.
site_url: https://akeldov.github.io/Akeldov.Math/
repo_url: https://github.com/Akeldov/Akeldov.Math
repo_name: Akeldov/Akeldov.Math

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Libraries:
      - Overview: Libraries/index.md
      - Akeldov.Math.Spatial2D:
          - Overview: Spatial2D/index.md
          - Getting Started: Spatial2D/getting-started.md
          - Learn:
              - Overview: Spatial2D/learn/index.md
              - Vectors: Spatial2D/learn/vectors.md
              - Curves:
                  - Overview: Spatial2D/learn/curves.md
                  - Linear Curves: Spatial2D/learn/curves/linear.md
              - Regions: Spatial2D/learn/regions.md
              - Rasterization: Spatial2D/learn/rasterization.md
              - Poisson Disk Sampling: Spatial2D/learn/poisson-disk-sampling.md
              - Voronoi Partitioning: Spatial2D/learn/voronoi-partitioning.md
              - Influence Fields:
                  - Overview: Spatial2D/learn/influence-fields/index.md
                  - Sampling: Spatial2D/learn/influence-fields/sampling.md
                  - Culling: Spatial2D/learn/influence-fields/culling.md
      - Akeldov.Math.Intervals:
          - Overview: Intervals/index.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true
